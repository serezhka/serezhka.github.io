<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#1a1025"/>
  <meta name="description" content="Намек понял — вечерняя игра со словами 18+"/>
  <title>Намек понял</title>
  <style>
    :root {
      --bg: #120a18;
      --surface: #1f1428;
      --text: #f4eefe;
      --muted: #9a87ad;
      --accent: #e040a8;
      --accent-dim: #8b2d6a;
      --num: #7c5cbf;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }
    body {
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(224, 64, 168, 0.15), transparent),
        var(--bg);
    }
    .wrap {
      max-width: 28rem;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(1.35rem, 4.5vw, 1.6rem);
      font-weight: 700;
      text-align: center;
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .row {
      display: grid;
      grid-template-columns: 2.75rem 1fr;
      align-items: center;
      gap: 0.85rem;
      padding: 1rem 1.1rem;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-height: 3.6rem;
    }
    .num {
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--num), #4a3578);
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .word {
      font-size: clamp(1.28rem, 4.8vw, 1.55rem);
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }
    button {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      box-shadow: 0 4px 20px rgba(224, 64, 168, 0.35);
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    button:active {
      transform: scale(0.98);
      filter: brightness(1.05);
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Намек понял</h1>
    <p class="sub">18+ · объясни слово без «опасных» слов или покажи жестами</p>
    <div class="list" id="list" aria-live="polite"></div>
    <button type="button" id="next">Следующие слова</button>
    <p class="hint">Слова перемешаны случайно · на телефоне лучше держать вертикально</p>
  </div>
  <script>
(function () {
  /** Пул: одно слово, 18+, лёгкий намёк без грубой лексики. */
  const POOL = [
    "флирт", "интим", "страсть", "соблазн", "искушение", "влечение", "желание",
    "томление", "возбуждение", "подкат", "пикап", "кокетство", "поцелуй", "обнимашки",
    "ласки", "прикосновение", "щекотка", "взгляд", "улыбка", "декольте", "чулки",
    "кружево", "бельё", "мини", "прозрачность", "намёк", "двусмысленность", "игра",
    "массаж", "джакузи", "пена", "парилка", "сауна", "душ", "полотенце", "парение",
    "постель", "простыня", "подушка", "одеяло", "ночь", "темнота", "свеча", "тишина",
    "стриптиз", "танец", "тверк", "клуб", "бар", "VIP", "шот", "градус", "опьянение",
    "расслабление", "голый", "голая", "нагишом", "нагота", "раздевание", "молния",
    "грудь", "попка", "ягодицы", "бёдра", "бикини", "купальник", "пижама", "шёлк",
    "атлас", "соблазнение", "очарование", "прелесть", "игривость", "шалость", "каприз",
    "романтика", "свидание", "рандеву", "комплимент", "пикантность", "острота",
    "перчик", "персик", "вишенка", "банан", "огурец", "кремовый", "влажный", "липкий",
    "секс", "близость", "нежность", "наслаждение", "удовольствие", "презерватив", "смазка",
    "лубрикант", "фетиш", "наручники", "плетка", "маска", "костюм", "ролевка",
    "доминация", "подчинение", "БДСМ", "табу", "запрет", "фантазия", "грёза", "сон",
    "секрет", "тайна", "грешок", "грех", "слабость", "слабинка", "интрига", "интерес",
    "тантра", "йога", "энергия", "контакт", "чувственность", "чувства", "доверие",
    "свинг", "вечеринка", "afterparty", "измена", "ревность", "ревнивец", "ревнивица",
    "кокетка", "шалун", "шалунья", "ловелас", "баловень", "красотка", "красавчик",
    "эротика", "аниме", "кино", "сериал", "целуйся", "обнимайся", "шепот", "вздох",
    "клубничка", "шоколад", "вишня", "сливки", "мёд", "имбирь", "корица", "мята",
    "занавеска", "полумрак", "сумерки", "рассвет",
    "училка", "медсестра", "стюардесса", "няня", "начальница", "секретарша", "официантка",
    "косплей", "пижамка", "караоке", "телефон", "переписка", "лайк",
    "свайп", "матч", "тиндер", "профиль", "аватарка", "фоточка", "сторис", "рилс",
    "подписка", "эксклюзив", "приват", "монокини", "стринги", "бюстье"
  ];

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let deck = shuffle(POOL);
  let pos = 0;

  function takeFive() {
    const out = [];
    for (let i = 0; i < 5; i++) {
      if (pos >= deck.length) {
        deck = shuffle(POOL);
        pos = 0;
      }
      out.push(deck[pos++]);
    }
    return out;
  }

  const listEl = document.getElementById("list");
  const nextBtn = document.getElementById("next");

  function render() {
    const words = takeFive();
    listEl.innerHTML = words
      .map(
        (w, i) =>
          `<div class="row"><span class="num" aria-hidden="true">${i + 1}</span><span class="word">${escapeHtml(w)}</span></div>`
      )
      .join("");
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  nextBtn.addEventListener("click", render);
  render();
})();
  </script>
</body>
</html>
